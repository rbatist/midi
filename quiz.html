<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Talent 1 — Quiz Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body {
  font-family: 'Nunito', sans-serif;
  background: #1a0533;
  color: #fff;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow: hidden;
  position: fixed;
  width: 100%;
  height: 100%;
}

/* ===== CANVAS ===== */
#confetti-canvas {
  position: fixed; inset: 0; pointer-events: none; z-index: 999;
}

/* ===== SCREENS ===== */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 20px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
  transform: translateX(30px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.screen.active {
  opacity: 1; pointer-events: all; transform: translateX(0);
}
.screen.exit {
  opacity: 0; transform: translateX(-30px);
}

/* ===== HOME SCREEN ===== */
.home-bg {
  position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0;
}
.star {
  position: absolute; font-size: 40px; animation: float 4s ease-in-out infinite;
  opacity: 0.15;
}
.s1 { top: 8%; left: 5%; animation-delay: 0s; }
.s2 { top: 15%; right: 8%; animation-delay: 1s; }
.s3 { bottom: 30%; left: 10%; animation-delay: 2s; }
.s4 { bottom: 15%; right: 12%; animation-delay: 0.5s; }
@keyframes float {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-18px) rotate(12deg); }
}

.home-content {
  position: relative; z-index: 1; width: 100%; max-width: 400px;
  display: flex; flex-direction: column; align-items: center; padding-top: 24px;
  gap: 16px;
}

.logo-badge {
  background: linear-gradient(135deg, #ff6b6b, #ffd93d);
  color: #1a0533; font-family: 'Fredoka One', cursive;
  font-size: 13px; letter-spacing: 3px; font-weight: 400;
  padding: 5px 18px; border-radius: 99px;
  box-shadow: 0 4px 20px rgba(255,107,107,0.5);
}

.game-title {
  font-family: 'Fredoka One', cursive;
  font-size: 68px; line-height: 0.9;
  text-align: center; font-weight: 400;
  text-shadow: 0 4px 30px rgba(255,217,61,0.4);
  color: #fff;
}
.game-title span {
  background: linear-gradient(135deg, #ffd93d, #ff6b6b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.game-sub {
  font-size: 14px; color: rgba(255,255,255,0.5); letter-spacing: 1px;
}

.highscore-display {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 10px 22px;
  font-size: 14px; color: rgba(255,255,255,0.7);
  display: flex; align-items: center; gap: 8px;
}
.hs-icon { font-size: 18px; }

/* Difficulty picker */
.difficulty-picker { width: 100%; }
.diff-label { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; text-align: center; }
.diff-btns { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
.diff-btn {
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 14px; color: rgba(255,255,255,0.6);
  font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700;
  padding: 10px 4px; cursor: pointer; transition: all 0.2s; line-height: 1.3;
}
.diff-btn small { font-size: 10px; font-weight: 400; display: block; opacity: 0.7; }
.diff-btn.active {
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  border-color: #a855f7; color: #fff;
  box-shadow: 0 4px 16px rgba(168,85,247,0.5);
}
.diff-btn:active { transform: scale(0.95); }

/* Start button */
.btn-start {
  width: 100%; padding: 18px;
  background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 100%);
  border: none; border-radius: 20px;
  font-family: 'Fredoka One', cursive; font-size: 26px;
  color: #1a0533; cursor: pointer; position: relative; overflow: hidden;
  box-shadow: 0 8px 30px rgba(255,107,107,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 1px;
}
.btn-start:active { transform: scale(0.97); box-shadow: 0 4px 16px rgba(255,107,107,0.4); }
.btn-shine {
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shine 2.5s infinite;
}
@keyframes shine { 0% { left: -100%; } 60%,100% { left: 150%; } }

.btn-scores {
  background: none; border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 14px; color: rgba(255,255,255,0.5); font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 600; padding: 10px 24px; cursor: pointer;
  transition: all 0.2s;
}
.btn-scores:active { background: rgba(255,255,255,0.1); }

/* ===== COUNTDOWN ===== */
#screen-countdown { background: #1a0533; justify-content: center; }
.countdown-wrap { text-align: center; }
.countdown-num {
  font-family: 'Fredoka One', cursive; font-size: 140px; line-height: 1;
  background: linear-gradient(135deg, #ffd93d, #ff6b6b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: countPop 0.4s ease-out;
}
@keyframes countPop {
  0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
  70% { transform: scale(1.15) rotate(3deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
.countdown-label {
  font-size: 18px; color: rgba(255,255,255,0.5); margin-top: 12px;
}

/* ===== GAME SCREEN ===== */
#screen-game {
  background: linear-gradient(160deg, #1a0533 0%, #0f172a 100%);
  justify-content: flex-start; gap: 10px;
  padding-top: max(env(safe-area-inset-top), 16px);
}

.game-header {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 420px;
}
.streak-badge {
  background: rgba(255,107,107,0.2); border: 1px solid rgba(255,107,107,0.4);
  border-radius: 99px; padding: 5px 12px;
  display: flex; align-items: center; gap: 4px;
  font-family: 'Fredoka One', cursive; font-size: 16px; color: #ff6b6b;
  transition: transform 0.2s;
}
.streak-badge.bump { animation: bump 0.3s; }
@keyframes bump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
.streak-fire { font-size: 16px; }

.q-counter {
  text-align: center; font-size: 13px;
  color: rgba(255,255,255,0.5); font-weight: 700; margin-bottom: 4px;
}
.progress-track {
  width: 120px; height: 6px; background: rgba(255,255,255,0.1);
  border-radius: 99px; overflow: hidden;
}
.progress-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #a855f7, #ffd93d);
  border-radius: 99px; transition: width 0.5s ease;
}

.score-pill {
  background: rgba(255,217,61,0.15); border: 1px solid rgba(255,217,61,0.3);
  border-radius: 99px; padding: 5px 12px;
  display: flex; align-items: center; gap: 4px;
  font-family: 'Fredoka One', cursive; font-size: 16px; color: #ffd93d;
}
.score-icon { font-size: 14px; }

/* Timer */
.timer-container {
  position: relative; width: 90px; height: 90px;
  flex-shrink: 0; align-self: center;
}
.timer-svg { width: 90px; height: 90px; transform: rotate(-90deg); }
.timer-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 8; }
.timer-fill {
  fill: none; stroke: #a855f7; stroke-width: 8;
  stroke-linecap: round;
  stroke-dasharray: 327; stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear, stroke 0.5s;
}
.timer-fill.warn { stroke: #ff6b6b; }
.timer-text {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Fredoka One', cursive; font-size: 26px; color: #fff;
}

/* Question card */
.question-card {
  width: 100%; max-width: 420px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 22px; padding: 16px 18px;
  flex-shrink: 0;
}
.q-hoofdstuk {
  display: inline-block;
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  padding: 3px 10px; border-radius: 99px; margin-bottom: 4px;
}
.q-category {
  font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 8px;
}
.q-text {
  font-size: 17px; font-weight: 700; line-height: 1.4; color: #fff;
}

/* Answers */
.answers-grid {
  width: 100%; max-width: 420px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  flex-shrink: 0;
}
.answer-btn {
  padding: 14px 12px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 16px; color: #fff;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; line-height: 1.3; transition: all 0.15s;
  min-height: 60px; display: flex; align-items: center; justify-content: center;
  text-align: center;
}
.answer-btn:active:not(:disabled) { transform: scale(0.96); }
.answer-btn.correct {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border-color: #22c55e;
  box-shadow: 0 0 24px rgba(34,197,94,0.5);
  animation: correctPop 0.4s ease;
}
.answer-btn.wrong {
  background: linear-gradient(135deg, #ef4444, #b91c1c);
  border-color: #ef4444;
  box-shadow: 0 0 20px rgba(239,68,68,0.4);
  animation: shake 0.4s ease;
}
.answer-btn.reveal {
  background: rgba(34,197,94,0.15);
  border-color: rgba(34,197,94,0.4);
}
.answer-btn:disabled { cursor: default; }
@keyframes correctPop {
  0%{transform:scale(1)} 40%{transform:scale(1.08)} 100%{transform:scale(1)}
}
@keyframes shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
}

/* Bonus bar */
.bonus-bar {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 99px; padding: 6px 18px;
  font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5);
  text-align: center; align-self: center;
  transition: all 0.3s;
}
.bonus-bar.active {
  background: rgba(255,217,61,0.15);
  border-color: rgba(255,217,61,0.4);
  color: #ffd93d;
}

/* ===== FEEDBACK SCREEN ===== */
#screen-feedback {
  background: rgba(26, 5, 51, 0.97);
  justify-content: center; gap: 12px;
  backdrop-filter: blur(20px);
}
.feedback-wrap {
  width: 100%; max-width: 400px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  padding: 20px;
}
.feedback-emoji { font-size: 72px; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn {
  0% { transform: scale(0) rotate(-20deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.feedback-title {
  font-family: 'Fredoka One', cursive; font-size: 40px; text-align: center;
}
.feedback-title.good { color: #4ade80; }
.feedback-title.bad { color: #f87171; }
.feedback-pts {
  font-family: 'Fredoka One', cursive; font-size: 26px; color: #ffd93d;
  opacity: 0; animation: fadeUp 0.4s 0.2s ease forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.feedback-explanation {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 14px 16px;
  font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.8);
  max-width: 100%; width: 100%;
}
.feedback-answer {
  font-size: 13px; color: rgba(255,255,255,0.4); font-style: italic;
}
.btn-next {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  border: none; border-radius: 18px;
  font-family: 'Fredoka One', cursive; font-size: 22px; color: #fff;
  cursor: pointer; box-shadow: 0 6px 24px rgba(168,85,247,0.4);
  transition: transform 0.15s;
}
.btn-next:active { transform: scale(0.97); }

/* ===== RESULT SCREEN ===== */
#screen-result {
  background: linear-gradient(160deg, #1a0533 0%, #0f172a 100%);
  justify-content: flex-start; padding-top: 24px;
}
.result-wrap {
  width: 100%; max-width: 400px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  padding-bottom: 40px;
}
.result-trophy { font-size: 80px; animation: trophyBounce 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes trophyBounce {
  0%{transform:scale(0) translateY(-40px);opacity:0}
  100%{transform:scale(1) translateY(0);opacity:1}
}
.result-title {
  font-family: 'Fredoka One', cursive; font-size: 36px; text-align: center;
  color: #ffd93d;
}
.result-score-big {
  font-family: 'Fredoka One', cursive; font-size: 80px; line-height: 1;
  background: linear-gradient(135deg, #ffd93d, #ff6b6b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.result-sub { font-size: 14px; color: rgba(255,255,255,0.4); letter-spacing: 2px; margin-top: -8px; }

.result-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%;
}
.stat-box {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 12px 6px; text-align: center;
}
.stat-num { font-family: 'Fredoka One', cursive; font-size: 24px; color: #a855f7; }
.stat-lbl { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; letter-spacing: 0.5px; }

.new-record {
  background: linear-gradient(135deg, #ffd93d, #ff6b6b);
  color: #1a0533; font-family: 'Fredoka One', cursive; font-size: 20px;
  padding: 10px 28px; border-radius: 99px;
  box-shadow: 0 6px 24px rgba(255,217,61,0.5);
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%,100%{transform:scale(1)} 50%{transform:scale(1.05)}
}

.result-btns { display: flex; gap: 10px; width: 100%; }
.btn-play-again {
  flex: 1; padding: 14px;
  background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 16px; color: #fff;
  font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}
.btn-play-again.btn-retry {
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  border-color: #a855f7;
  box-shadow: 0 4px 16px rgba(168,85,247,0.4);
}
.btn-play-again:active { transform: scale(0.96); }

.wrong-list { width: 100%; }
.wrong-list-title {
  font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 10px; text-align: center;
}
.wrong-item {
  background: rgba(255,68,68,0.07); border: 1px solid rgba(255,68,68,0.15);
  border-radius: 14px; padding: 12px 14px; margin-bottom: 8px;
}
.wrong-item-q { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.8); margin-bottom: 6px; }
.wrong-item-a { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 2px; }
.wrong-item-a span.correct-ans { color: #4ade80; font-weight: 700; }
.wrong-item-expl { font-size: 12px; color: rgba(255,255,255,0.4); font-style: italic; line-height: 1.5; }

/* ===== SCOREBOARD ===== */
#screen-scores {
  background: linear-gradient(160deg, #1a0533 0%, #0f172a 100%);
  justify-content: flex-start; padding-top: 24px; gap: 16px;
}
.scores-wrap { width: 100%; max-width: 400px; }
.btn-back {
  background: none; border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 12px; color: rgba(255,255,255,0.6);
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
  padding: 8px 18px; cursor: pointer; margin-bottom: 12px;
}
.scores-title {
  font-family: 'Fredoka One', cursive; font-size: 32px; color: #ffd93d;
  text-align: center; margin-bottom: 16px;
}
.scores-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.score-entry {
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 12px 16px;
}
.score-rank {
  font-family: 'Fredoka One', cursive; font-size: 22px;
  width: 32px; text-align: center;
}
.score-info { flex: 1; }
.score-pts { font-family: 'Fredoka One', cursive; font-size: 20px; color: #ffd93d; }
.score-meta { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.score-entry:nth-child(1) .score-rank { color: #ffd93d; }
.score-entry:nth-child(2) .score-rank { color: #c0c0c0; }
.score-entry:nth-child(3) .score-rank { color: #cd7f32; }
.no-scores { text-align: center; color: rgba(255,255,255,0.3); font-size: 15px; padding: 40px; }
.btn-clear-scores {
  width: 100%; background: none; border: 1px solid rgba(255,68,68,0.3);
  border-radius: 12px; color: rgba(255,68,68,0.5);
  font-family: 'Nunito', sans-serif; font-size: 13px; padding: 10px; cursor: pointer;
}

/* ===== FLOATING SCORE POPUP ===== */
.score-popup {
  position: fixed; font-family: 'Fredoka One', cursive;
  font-size: 28px; color: #ffd93d; pointer-events: none; z-index: 100;
  text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  animation: floatUp 1s ease forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
}

/* Scrollbar hide */
::-webkit-scrollbar { display: none; }

</style>
</head>
<body>

<!-- CONFETTI CANVAS -->
<canvas id="confetti-canvas"></canvas>

<!-- SCREEN: HOME -->
<div id="screen-home" class="screen active">
  <div class="home-bg">
    <div class="star s1">⭐</div>
    <div class="star s2">🌟</div>
    <div class="star s3">✨</div>
    <div class="star s4">⭐</div>
  </div>
  <div class="home-content">
    <div class="logo-badge">TALENT 1</div>
    <h1 class="game-title">Quiz<br><span>Master</span></h1>
    <p class="game-sub">Havo / VWO &nbsp;·&nbsp; H1.7 – H3.9</p>
    <div class="highscore-display" id="home-highscore">
      <span class="hs-icon">🏆</span>
      <span id="hs-text">Nog geen highscore</span>
    </div>
    <div class="difficulty-picker">
      <div class="diff-label">Moeilijkheid</div>
      <div class="diff-btns">
        <button class="diff-btn active" data-diff="10">Makkelijk<br><small>10 vr</small></button>
        <button class="diff-btn" data-diff="20">Normaal<br><small>20 vr</small></button>
        <button class="diff-btn" data-diff="50">Uitdaging<br><small>50 vr</small></button>
        <button class="diff-btn" data-diff="100">🔥 Alles<br><small>100 vr</small></button>
      </div>
    </div>
    <button class="btn-start" id="btn-start">
      <span>SPELEN!</span>
      <div class="btn-shine"></div>
    </button>
    <button class="btn-scores" onclick="showScreen('screen-scores')">🏅 Scorebord</button>
  </div>
</div>

<!-- SCREEN: COUNTDOWN -->
<div id="screen-countdown" class="screen">
  <div class="countdown-wrap">
    <div id="countdown-num" class="countdown-num">3</div>
    <div class="countdown-label">Klaar voor de start?</div>
  </div>
</div>

<!-- SCREEN: GAME -->
<div id="screen-game" class="screen">
  <!-- Header -->
  <div class="game-header">
    <div class="hdr-left">
      <div class="streak-badge" id="streak-badge">
        <span class="streak-fire">🔥</span>
        <span id="streak-count">0</span>
      </div>
    </div>
    <div class="hdr-center">
      <div class="q-counter" id="q-counter">1 / 10</div>
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="score-pill" id="score-pill">
        <span class="score-icon">⭐</span>
        <span id="live-score">0</span>
      </div>
    </div>

let audioCtx = null;
function getAudio() {

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + duration + 0.05);
  } catch(e) {}
}

// ── State ──
let state = {
  vragen: [],
  huidig: 0,
  score: 0,
  streak: 0,
  maxStreak: 0,
  goedCount: 0,
  foutCount: 0,
  fouteVragen: [],
  timerInterval: null,
  timerLeft: 15,
  answered: false,
  multiplier: 1,
  diffCount: 10
};

// ── Utilities ──
function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function $(id) { return document.getElementById(id); }

// ── Screen management ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active', 'exit');
  });
  document.getElementById(id).classList.add('active');
}

function transitionTo(id) {
  const current = document.querySelector('.screen.active');
  if (current) current.classList.add('exit');
  setTimeout(() => {
    current && current.classList.remove('active', 'exit');
    document.getElementById(id).classList.add('active');
  }, 280);
}

// ── Scores (localStorage) ──
function getScores() {
  try { return JSON.parse(localStorage.getItem('talent1_scores') || '[]'); } catch { return []; }
}
function saveScore(pts, correct, total, diff) {
  const scores = getScores();
  scores.push({ pts, correct, total, diff, date: new Date().toLocaleDateString('nl-NL') });
  scores.sort((a,b) => b.pts - a.pts);
  localStorage.setItem('talent1_scores', JSON.stringify(scores.slice(0,10)));
}
function getHighscore() {
  const s = getScores();
  return s.length ? s[0].pts : 0;
}

function updateHomeHighscore() {
  const hs = getHighscore();
  $('hs-text').textContent = hs ? `Highscore: ${hs} punten` : 'Nog geen highscore';
}

function showScores() {
  const scores = getScores();
  const list = $('scores-list');
  if (!scores.length) {
    list.innerHTML = '<div class="no-scores">Nog geen scores gespeeld!</div>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  list.innerHTML = scores.map((s,i) => `
    <div class="score-entry">
      <div class="score-rank">${medals[i] || (i+1)}</div>
      <div class="score-info">
        <div class="score-pts">${s.pts} pts</div>
        <div class="score-meta">${s.correct}/${s.total} goed · ${s.diff} vragen · ${s.date}</div>
      </div>
    </div>
  `).join('');
}

function clearScores() {
  if (confirm('Weet je zeker dat je alle scores wilt wissen?')) {
    localStorage.removeItem('talent1_scores');
    showScores();
    updateHomeHighscore();
  }
}

// ── Home setup ──
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.diffCount = parseInt(btn.dataset.diff);
    SFX.click();
  });
});

$('btn-start').addEventListener('click', () => {
  SFX.click();
  startCountdown();
});

// ── Countdown ──
function startCountdown() {
  transitionTo('screen-countdown');
  let n = 3;
  $('countdown-num').textContent = n;
  SFX.countdown();
  const iv = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(iv);
      $('countdown-num').textContent = 'GO!';
      SFX.go();
      setTimeout(() => startGame(), 700);
    } else {
      $('countdown-num').textContent = n;
      // Trigger re-animation
      const el = $('countdown-num');
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = 'countPop 0.4s ease-out';
      SFX.countdown();
    }
  }, 900);
}

// ── Game start ──
function startGame() {
  const pool = shuffle(ALLE_VRAGEN);
  state.vragen = pool.slice(0, Math.min(state.diffCount, pool.length));
  state.huidig = 0;
  state.score = 0;
  state.streak = 0;
  state.maxStreak = 0;
  state.goedCount = 0;
  state.foutCount = 0;
  state.fouteVragen = [];
  state.multiplier = 1;
  transitionTo('screen-game');
  renderVraag();
}

// ── Render question ──
function renderVraag() {
  const v = state.vragen[state.huidig];
  const n = state.huidig + 1;
  const tot = state.vragen.length;
  state.answered = false;

  // Header
  $('q-counter').textContent = `${n} / ${tot}`;
  $('progress-bar').style.width = `${((n-1)/tot)*100}%`;
  $('live-score').textContent = state.score;
  updateStreakBadge();
  updateBonusBar();

  // Question
  $('q-hoofdstuk').textContent = `H ${v.h}`;
  $('q-category').textContent = v.cat;
  $('q-text').textContent = v.v;

  // Randomize option order
  const shuffled = shuffle(v.o.map((o,i) => ({ text: o, orig: i })));
  const correctOrig = v.c;

  const grid = $('answers-grid');
  grid.innerHTML = shuffled.map((opt, idx) => `
    <button class="answer-btn" onclick="answerClick(this, ${opt.orig === correctOrig}, ${opt.orig === correctOrig}, ${JSON.stringify(shuffled).replace(/"/g,'&quot;')}, ${correctOrig})">
      ${opt.text}
    </button>
  `).join('');

  // Rebuild with correct data
  grid.innerHTML = '';
  shuffled.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = opt.text;
    btn.dataset.origIdx = opt.orig;
    btn.onclick = () => handleAnswer(btn, opt.orig === correctOrig, shuffled, correctOrig);
    grid.appendChild(btn);
  });

  // Start timer
  startTimer();
}

// ── Timer ──
function startTimer() {
  clearInterval(state.timerInterval);
  state.timerLeft = 15;
  updateTimer();

  state.timerInterval = setInterval(() => {
    state.timerLeft--;
    updateTimer();

    if (state.timerLeft <= 5 && state.timerLeft > 0 && !state.answered) {
      SFX.urgentTick();
    } else if (state.timerLeft > 5 && !state.answered) {
      // silent
    }

    if (state.timerLeft <= 0) {
      clearInterval(state.timerInterval);
      if (!state.answered) timeUp();
    }
  }, 1000);
}

function updateTimer() {
  const pct = state.timerLeft / 15;
  const circumference = 2 * Math.PI * 52;
  const offset = circumference * (1 - pct);
  $('timer-fill').style.strokeDashoffset = offset;
  $('timer-text').textContent = state.timerLeft;

  const fill = $('timer-fill');
  if (state.timerLeft <= 5) fill.classList.add('warn');
  else fill.classList.remove('warn');
}

function timeUp() {
  state.answered = true;
  // Disable all buttons
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
  // Show correct answer
  const v = state.vragen[state.huidig];
  document.querySelectorAll('.answer-btn').forEach(b => {
    if (parseInt(b.dataset.origIdx) === v.c) b.classList.add('correct-toon');
  });
  state.streak = 0;
  state.foutCount++;
  state.fouteVragen.push({ ...v, gekozen: 'Geen antwoord (tijd op)' });
  SFX.wrong();
  updateStreakBadge();

  // Show feedback
  setTimeout(() => showFeedback(false, v, 'Tijd is op! ⏰', 0), 600);
}

// ── Handle answer ──
function handleAnswer(btn, isCorrect, shuffled, correctOrig) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timerInterval);

  const v = state.vragen[state.huidig];
  const allBtns = document.querySelectorAll('.answer-btn');
  allBtns.forEach(b => b.disabled = true);

  // Update multiplier based on time left
  const timeBonus = state.timerLeft >= 12 ? 3 : state.timerLeft >= 8 ? 2 : 1;

  if (isCorrect) {
    btn.classList.add('correct');
    state.streak++;
    state.maxStreak = Math.max(state.maxStreak, state.streak);
    state.goedCount++;

    // Streak multiplier
    state.multiplier = state.streak >= 5 ? 3 : state.streak >= 3 ? 2 : 1;
    const pts = 100 * state.multiplier * timeBonus;
    state.score += pts;
    $('live-score').textContent = state.score;

    if (state.streak >= 3) SFX.streak();
    else SFX.correct();

    showScorePopup(btn, `+${pts}`);
    updateStreakBadge();
    updateBonusBar();

    setTimeout(() => showFeedback(true, v, v.v, pts), 800);
  } else {
    btn.classList.add('wrong');
    // Show correct
    allBtns.forEach(b => {
      if (parseInt(b.dataset.origIdx) === correctOrig) b.classList.add('correct-toon');
    });
    state.streak = 0;
    state.foutCount++;
    state.fouteVragen.push({ ...v, gekozen: btn.textContent });
    state.multiplier = 1;
    SFX.wrong();
    updateStreakBadge();
    updateBonusBar();
    showScorePopup(btn, `0`, true);

    setTimeout(() => showFeedback(false, v, v.v, 0), 900);
  }
}

function showScorePopup(btn, text, isBad = false) {
  const rect = btn.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'score-popup';
  pop.textContent = text;
  pop.style.left = `${rect.left + rect.width/2 - 20}px`;
  pop.style.top = `${rect.top - 10}px`;
  if (isBad) pop.style.color = '#f87171';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1100);
}

function updateStreakBadge() {
  $('streak-count').textContent = state.streak;
  const badge = $('streak-badge');
  if (state.streak >= 3) {
    badge.style.background = 'rgba(255,107,107,0.3)';
    badge.style.borderColor = 'rgba(255,107,107,0.6)';
    badge.classList.add('bump');
    setTimeout(() => badge.classList.remove('bump'), 300);
  } else {
    badge.style.background = '';
    badge.style.borderColor = '';
  }
}

function updateBonusBar() {
  const bar = $('bonus-bar');
  const txt = $('bonus-text');
  if (state.streak >= 5) {
    txt.textContent = `⚡ 3× punten — MEGA STREAK! (${state.streak})`;
    bar.classList.add('active');
  } else if (state.streak >= 3) {
    txt.textContent = `⚡ 2× punten — Streak! (${state.streak})`;
    bar.classList.add('active');
  } else {
    txt.textContent = `⚡ 1× punten`;
    bar.classList.remove('active');
  }
}

// ── Feedback screen ──
function showFeedback(correct, v, vraagTekst, pts) {
  $('fb-emoji').textContent = correct ? (state.streak >= 5 ? '🔥' : state.streak >= 3 ? '🌟' : '✅') : '❌';
  const title = $('fb-title');
  title.textContent = correct
    ? (state.streak >= 5 ? 'MEGA STREAK!' : state.streak >= 3 ? 'Super goed!' : 'Goed!')
    : 'Helaas...';
  title.className = 'feedback-title ' + (correct ? 'good' : 'bad');

  $('fb-pts').textContent = pts > 0 ? `+${pts} punten` : 'Geen punten';
  $('fb-explanation').textContent = v.u;
  $('fb-answer').textContent = correct
    ? `Juist antwoord: ${v.o[v.c]}`
    : `Juist antwoord: ${v.o[v.c]}`;

  const isLast = state.huidig >= state.vragen.length - 1;
  $('btn-next').textContent = isLast ? 'Resultaat bekijken 🏆' : 'Volgende vraag →';
  $('btn-next').onclick = isLast ? showResult : nextQuestion;

  transitionTo('screen-feedback');
}

function nextQuestion() {
  SFX.click();
  state.huidig++;
  transitionTo('screen-game');
  setTimeout(renderVraag, 300);
}

// ── Result screen ──
function showResult() {
  clearInterval(state.timerInterval);
  const tot = state.vragen.length;
  const pct = Math.round((state.goedCount / tot) * 100);
  const isHighscore = state.score > getHighscore();

  saveScore(state.score, state.goedCount, tot, tot);

  $('result-score-big').textContent = state.score;
  $('stat-correct').textContent = state.goedCount;
  $('stat-wrong').textContent = state.foutCount;
  $('stat-streak').textContent = state.maxStreak;
  $('stat-pct').textContent = `${pct}%`;

  // Trophy & title
  let trophy, title;
  if (pct === 100) { trophy = '🏆'; title = 'Perfect!'; }
  else if (pct >= 80) { trophy = '🥇'; title = 'Uitstekend!'; }
  else if (pct >= 60) { trophy = '🥈'; title = 'Goed gedaan!'; }
  else if (pct >= 40) { trophy = '🥉'; title = 'Aardig!'; }
  else { trophy = '📚'; title = 'Blijven oefenen!'; }

  $('result-trophy').textContent = trophy;
  $('result-title').textContent = title;

  const newRec = $('new-record');
  newRec.style.display = isHighscore && state.score > 0 ? 'block' : 'none';

  // Wrong answers list
  const wl = $('wrong-list');
  if (state.fouteVragen.length > 0) {
    wl.innerHTML = `
      <div class="wrong-list-title">Verbeterpunten (${state.fouteVragen.length})</div>
      ${state.fouteVragen.map(f => `
        <div class="wrong-item">
          <div class="wrong-item-q">${f.v}</div>
          <div class="wrong-item-a">Jouw antwoord: <span style="color:#f87171">${f.gekozen || '—'}</span></div>
          <div class="wrong-item-a">Juist: <span class="correct-ans">${f.o[f.c]}</span></div>
          <div class="wrong-item-expl">${f.u}</div>
        </div>
      `).join('')}
    `;
  } else {
    wl.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.4);font-size:14px">🎯 Geen fouten! Geweldig!</div>';
  }

  transitionTo('screen-result');

  if (isHighscore && state.score > 0) {
    SFX.highscore();
    setTimeout(() => launchConfetti(), 400);
  } else if (pct >= 80) {
    SFX.streak();
    setTimeout(() => launchConfetti(30), 400);
  } else {
    SFX.gameover();
  }

  updateHomeHighscore();
}

function goHome() {
  SFX.click();
  clearInterval(state.timerInterval);
  updateHomeHighscore();
  transitionTo('screen-home');
}

function restartGame() {
  SFX.click();
  clearInterval(state.timerInterval);
  startCountdown();
}

// ── Confetti ──
function launchConfetti(count = 80) {
  const canvas = $('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#c77dff','#48cae4'];
  const pieces = [];

  for (let i = 0; i < count; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 200,
      vx: (Math.random() - 0.5) * 6,
      vy: 2 + Math.random() * 5,
      w: 8 + Math.random() * 12,
      h: 5 + Math.random() * 8,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.2
    });
  }

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.rot += p.vrot;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (frame < 180) requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  animate();
}
