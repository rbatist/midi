<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MIDI Player → Alesis SR18 (iPad Fix)</title>
  <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.27/build/Midi.js"></script>
  <style>
    :root {
      --bg: #111827; --surface: #1f2937; --surface2: #374151;
      --accent: #f97316; --accent2: #ea580c; --green: #22c55e;
      --text: #f3f4f6; --dim: #9ca3af; --border: #374151;
      --red: #ef4444; --blue: #60a5fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px; height: 100dvh; padding: 14px 20px;
      max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden;
    }
    .scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 10px; padding-bottom: 4px; }
    h1 { font-size: 1.05rem; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; flex-shrink: 0; }
    .card-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); margin-bottom: 10px; font-weight: 600; }
    .row { display: flex; gap: 8px; align-items: center; }
    select { flex: 1; min-width: 0; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 7px 10px; font-size: 0.88rem; outline: none; }
    button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 0.85rem; }
    button.accent { background: var(--accent); border-color: var(--accent2); font-weight: 600; min-width: 88px; }
    .dropzone { border: 2px dashed var(--border); border-radius: 10px; padding: 14px 16px; text-align: center; color: var(--dim); }
    .ch-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .ch-pill { font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; width: 120px; text-align: center; }
    .ch-pill.bass { background: #0f293a; color: #34d399; }
    .ch-pill.perc { background: #1a2a0f; color: #86efac; }
    .ch-pill.drums { background: #1e1033; color: #a78bfa; }
    .transport-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .prog-wrap { flex: 1; height: 5px; background: var(--surface2); border-radius: 4px; cursor: pointer; }
    .prog-fill { height: 100%; background: var(--accent); border-radius: 4px; width: 0%; }
    .status { font-size: 0.76rem; margin-top: 6px; min-height: 1em; color: var(--dim); }
    .status.ok { color: var(--green); }
    .status.err { color: var(--red); }
    .hidden { display: none !important; }
    
    /* Styling voor de standaard 'Kies Bestand' knop op iOS/Desktop */
    input[type="file"]::file-selector-button {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 0.8rem;
      margin-right: 10px; font-weight: 600;
    }
    input[type="file"]::file-selector-button:hover { background: #4b5563; }
  </style>
</head>
<body>

<h1><span class="dot"></span> MIDI Player → Alesis SR18</h1>

<div class="scroll-area">
  
  <div class="card">
    <div class="card-title">MIDI Uitgang</div>
    <div class="row">
      <select id="deviceSel" onchange="onDeviceChange()">
        <option value="">-- Zoeken naar apparaten... --</option>
      </select>
      <button onclick="refreshDevices()">↺</button>
    </div>
    <div class="status" id="deviceStatus">Initialiseren...</div>
  </div>

  <div class="card">
    <div class="card-title">MIDI Bestand</div>
    <div class="dropzone" style="padding: 15px 10px; cursor: pointer;">
      <input type="file" id="fileInput" accept=".mid,.midi,audio/midi" style="width: 100%; font-size: 0.9rem; color: var(--text); background: transparent; border: none; cursor: pointer;">
    </div>
    <div class="status" id="fileStatus"></div>
  </div>

  <div class="card hidden" id="tracksCard">
    <div class="card-title">Track toewijzing</div>
    <div id="trackRows">
        <div class="ch-row"><span class="ch-pill drums">DRUMS (Ch 10)</span><select id="selCh10" onchange="assignTrack(9, this.value)"><option value="">— Geen —</option></select></div>
        <div class="ch-row"><span class="ch-pill perc">PERC (Ch 2)</span><select id="selCh2" onchange="assignTrack(1, this.value)"><option value="">— Geen —</option></select></div>
        <div class="ch-row"><span class="ch-pill bass">BASS (Ch 1)</span><select id="selCh1" onchange="assignTrack(0, this.value)"><option value="">— Geen —</option></select></div>
    </div>
  </div>

  <div class="card hidden" id="transportCard">
    <div class="card-title">Transport</div>
    <div class="transport-row">
      <button class="accent" id="playBtn" onclick="togglePlay()" disabled>▶ Play</button>
      <button id="stopBtn" onclick="stopAll()" disabled>⏹ Stop</button>
      <input type="range" id="tempoSlider" min="40" max="200" value="100" style="width:100px">
    </div>
    <div class="prog-row" style="margin-top:10px; display:flex; align-items:center; gap:10px;">
      <div class="prog-wrap" id="progWrap" onclick="seek(event)"><div class="prog-fill" id="progFill"></div></div>
      <div id="timeLabel" style="font-size:12px">0:00 / 0:00</div>
    </div>
  </div>
</div>

<script>
let midiAccess = null, midiOutput = null, parsedMidi = null, allNotes = [];
let playing = false, startAcTime = 0, startOffset = 0, nextIdx = 0, audioCtx = null;
let assignment = { 0: null, 1: null, 9: null };

async function initMidi() {
  if (!navigator.requestMIDIAccess) {
    setStatus('deviceStatus', 'Web MIDI niet ondersteund. Gebruik de "Web MIDI Browser" app op iPad.', 'err');
    return;
  }
  try {
    // Gebruik sysex:true voor betere compatibiliteit met iPad MIDI bridges
    midiAccess = await navigator.requestMIDIAccess({ sysex: true });
    midiAccess.onstatechange = populateDevices;
    populateDevices();
    setStatus('deviceStatus', 'Web MIDI klaar.', 'ok');
  } catch (e) {
    setStatus('deviceStatus', 'MIDI fout: ' + e.message, 'err');
  }
}

function populateDevices() {
  const sel = document.getElementById('deviceSel');
  const prev = sel.value;
  sel.innerHTML = '<option value="">-- Selecteer MIDI uitgang --</option>';
  
  if (!midiAccess || !midiAccess.outputs) return;

  // Gebruik .forEach in plaats van for...of om de "not iterable" error op iOS te fixen
  midiAccess.outputs.forEach((port) => {
    const o = document.createElement('option');
    o.value = port.id;
    o.textContent = port.name || "Onbekend apparaat";
    if (port.id === prev) o.selected = true;
    sel.appendChild(o);
  });

  if (!prev && midiAccess.outputs.size > 0) {
    sel.selectedIndex = 1;
    onDeviceChange();
  }
}

function onDeviceChange() {
  const id = document.getElementById('deviceSel').value;
  midiOutput = midiAccess.outputs.get(id);
  updatePlayBtn();
}

function refreshDevices() { populateDevices(); }

// --- Bestand laden ---
document.getElementById('fileInput').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  
  try {
    const buf = await file.arrayBuffer();
    parsedMidi = new Midi(buf);
    document.getElementById('tracksCard').classList.remove('hidden');
    document.getElementById('transportCard').classList.remove('hidden');
    buildTrackOptions();
    updatePlayBtn();
    setStatus('fileStatus', `Bestand geladen: ${file.name}`, 'ok');
  } catch(err) {
    setStatus('fileStatus', `Fout bij laden bestand: ${err.message}`, 'err');
  }
};

function buildTrackOptions() {
  const opts = parsedMidi.tracks.map((t, i) => `<option value="${i}">${t.name || 'Track '+i} (${t.notes.length} noten)</option>`).join('');
  ['selCh10', 'selCh2', 'selCh1'].forEach(id => {
    const s = document.getElementById(id);
    s.innerHTML = '<option value="">— Geen —</option>' + opts;
  });
}

function assignTrack(ch, val) {
  assignment[ch] = val === "" ? null : parseInt(val);
  buildAllNotes();
  updatePlayBtn();
}

function buildAllNotes() {
  allNotes = [];
  Object.entries(assignment).forEach(([ch, trackIdx]) => {
    if (trackIdx === null) return;
    parsedMidi.tracks[trackIdx].notes.forEach(n => {
      allNotes.push({ time: n.time, pitch: n.midi, vel: Math.round(n.velocity*127), ch: parseInt(ch), on: true });
      allNotes.push({ time: n.time + n.duration, pitch: n.midi, vel: 0, ch: parseInt(ch), on: false });
    });
  });
  allNotes.sort((a, b) => a.time - b.time);
}

// --- Playback Logica ---
function togglePlay() {
  if (playing) {
    playing = false;
    document.getElementById('playBtn').textContent = '▶ Play';
  } else {
    if (!audioCtx) audioCtx = new AudioContext();
    playing = true;
    startAcTime = audioCtx.currentTime;
    document.getElementById('playBtn').textContent = '⏸ Pause';
    tick();
  }
}

function tick() {
  if (!playing || !midiOutput) return;
  const now = (audioCtx.currentTime - startAcTime) + startOffset;
  
  while(nextIdx < allNotes.length && allNotes[nextIdx].time <= now) {
    const n = allNotes[nextIdx];
    const status = n.on ? (0x90 | n.ch) : (0x80 | n.ch);
    midiOutput.send([status, n.pitch, n.vel]);
    nextIdx++;
  }

  const progress = (now / parsedMidi.duration) * 100;
  document.getElementById('progFill').style.width = Math.min(progress, 100) + '%';
  
  if (nextIdx < allNotes.length) requestAnimationFrame(tick);
  else stopAll();
}

function stopAll() {
  playing = false; nextIdx = 0; startOffset = 0;
  document.getElementById('playBtn').textContent = '▶ Play';
  document.getElementById('progFill').style.width = '0%';
  if (midiOutput) { for(let i=0; i<16; i++) midiOutput.send([0xB0|i, 123, 0]); }
}

function updatePlayBtn() {
  document.getElementById('playBtn').disabled = !(parsedMidi && midiOutput && (assignment[0] !== null || assignment[1] !== null || assignment[9] !== null));
}

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + (type || '');
}

initMidi();
</script>
</body>
</html>
