<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MIDI Player → Alesis SR18</title>
  
  <script src="https://unpkg.com/@tonejs/midi"></script>

  <style>
    :root {
      --bg: #111827; --surface: #1f2937; --surface2: #374151;
      --accent: #f97316; --accent2: #ea580c; --green: #22c55e;
      --text: #f3f4f6; --dim: #9ca3af; --border: #374151;
      --red: #ef4444; --blue: #60a5fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px; padding: 20px; max-width: 800px; margin: 0 auto;
    }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card-title { font-size: 0.65rem; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; font-weight: 600; }
    .row { display: flex; gap: 8px; align-items: center; }
    select { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px; font-size: 0.9rem; }
    button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 16px; cursor: pointer; }
    button.accent { background: var(--accent); border: none; font-weight: 600; }
    .status { font-size: 0.75rem; margin-top: 6px; color: var(--dim); }
    .status.ok { color: var(--green); }
    .status.err { color: var(--red); }
    .ch-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .ch-pill { font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; width: 110px; text-align: center; }
    .ch-pill.drums { background: #1e1033; color: #a78bfa; }
    .ch-pill.perc { background: #1a2a0f; color: #86efac; }
    .ch-pill.bass { background: #0f293a; color: #34d399; }
    .prog-wrap { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; margin: 15px 0; cursor: pointer; }
    .prog-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 3px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<h2 style="margin-bottom: 20px;">MIDI Player → Alesis SR18</h2>

<div class="card">
  <div class="card-title">1. MIDI Uitgang</div>
  <div class="row">
    <select id="deviceSel" onchange="onDeviceChange()">
      <option value="">-- Zoek naar apparaten... --</option>
    </select>
    <button onclick="initMidi()">↺</button>
  </div>
  <div id="deviceStatus" class="status">Wachten op MIDI...</div>
</div>

<div class="card">
  <div class="card-title">2. MIDI Bestand</div>
  <input type="file" id="fileInput" accept=".mid,.midi" style="width: 100%;">
  <div id="fileStatus" class="status">Klaar om te laden.</div>
</div>

<div class="card hidden" id="tracksCard">
  <div class="card-title">3. Automatische Toewijzing</div>
  <div class="ch-row"><span class="ch-pill drums">DRUMS (Ch 10)</span><select id="selCh10" onchange="assignTrack(9, this.value)"></select></div>
  <div class="ch-row"><span class="ch-pill perc">PERC (Ch 2)</span><select id="selCh2" onchange="assignTrack(1, this.value)"></select></div>
  <div class="ch-row"><span class="ch-pill bass">BASS (Ch 1)</span><select id="selCh1" onchange="assignTrack(0, this.value)"></select></div>
</div>

<div class="card hidden" id="transportCard">
  <div class="card-title">4. Bediening</div>
  <div class="row">
    <button id="playBtn" class="accent" onclick="togglePlay()" disabled>▶ PLAY</button>
    <button onclick="stopAll()">⏹ STOP</button>
    <div style="margin-left: auto;">Tempo: <input type="range" id="tempoSlider" min="50" max="150" value="100" style="width: 80px;"></div>
  </div>
  <div class="prog-wrap" onclick="seek(event)"><div class="prog-fill" id="progFill"></div></div>
  <div id="timeLabel" style="text-align: center; font-size: 12px; color: var(--dim);">0:00 / 0:00</div>
</div>

<script>
let midiAccess = null, midiOutput = null, parsedMidi = null, allNotes = [];
let playing = false, startAcTime = 0, startOffset = 0, nextIdx = 0, audioCtx = null;
let assignment = { 0: null, 1: null, 9: null };

// --- MIDI INIT ---
async function initMidi() {
  if (!navigator.requestMIDIAccess) {
    setStatus('deviceStatus', 'Browser ondersteunt geen MIDI.', 'err');
    return;
  }
  try {
    midiAccess = await navigator.requestMIDIAccess();
    populateDevices();
    setStatus('deviceStatus', 'MIDI Verbonden.', 'ok');
  } catch (e) {
    setStatus('deviceStatus', 'Toegang geweigerd.', 'err');
  }
}

function populateDevices() {
  const sel = document.getElementById('deviceSel');
  sel.innerHTML = '<option value="">-- Kies Uitgang --</option>';
  midiAccess.outputs.forEach(port => {
    const o = document.createElement('option');
    o.value = port.id; o.textContent = port.name;
    sel.appendChild(o);
  });
}

function onDeviceChange() {
  midiOutput = midiAccess.outputs.get(document.getElementById('deviceSel').value);
  updatePlayBtn();
}

// --- BESTAND LADEN EN ANALYSE ---
document.getElementById('fileInput').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  try {
    const buf = await file.arrayBuffer();
    // Gebruik de juiste constructor van de bibliotheek
    const Constructor = typeof Midi !== 'undefined' ? (Midi.Midi || Midi) : (window.Midi ? (window.Midi.Midi || window.Midi) : null);
    if (!Constructor) throw new Error("MIDI Library niet gevonden");

    parsedMidi = new Constructor(buf);
    
    // Analyseer alle tracks
    const analyzedTracks = parsedMidi.tracks.map((t, i) => {
      const name = (t.name || '').toLowerCase();
      let type = '';
      let score = 0;

      // Drum detectie (naam of kanaal 10)
      if (t.channel === 9 || name.includes('drum') || name.includes('kit') || name.includes('perc')) {
        type = 'drums'; score = 10;
      } 
      // Bass detectie (naam of instrument familie)
      else if (name.includes('bass') || name.includes('bas') || (t.instrument && t.instrument.family === 'bass')) {
        type = 'bass'; score = 10;
      }

      return { index: i, name: t.name || `Track ${i+1}`, type, score, notes: t.notes.length };
    });

    // Auto-assign op basis van analyse
    assignment = { 0: null, 1: null, 9: null };
    const drums = analyzedTracks.find(t => t.type === 'drums' && t.notes > 0);
    const bass = analyzedTracks.find(t => t.type === 'bass' && t.notes > 0);

    if (drums) assignment[9] = drums.index;
    if (bass) assignment[0] = bass.index;

    // Update UI
    document.getElementById('tracksCard').classList.remove('hidden');
    document.getElementById('transportCard').classList.remove('hidden');
    
    const opts = analyzedTracks.map(t => `<option value="${t.index}">${t.name} (${t.notes} noten)</option>`).join('');
    ['selCh10', 'selCh2', 'selCh1'].forEach(id => {
      const select = document.getElementById(id);
      select.innerHTML = '<option value="">-- Geen --</option>' + opts;
      const ch = id === 'selCh10' ? 9 : (id === 'selCh2' ? 1 : 0);
      if (assignment[ch] !== null) select.value = assignment[ch];
    });

    buildAllNotes();
    setStatus('fileStatus', `Geladen: ${file.name}`, 'ok');
  } catch (err) {
    setStatus('fileStatus', 'Fout: ' + err.message, 'err');
  }
};

function assignTrack(ch, val) {
  assignment[ch] = val === "" ? null : parseInt(val);
  buildAllNotes();
  updatePlayBtn();
}

function buildAllNotes() {
  allNotes = [];
  if (!parsedMidi) return;
  Object.entries(assignment).forEach(([ch, trackIdx]) => {
    if (trackIdx === null) return;
    parsedMidi.tracks[trackIdx].notes.forEach(n => {
      allNotes.push({ time: n.time, pitch: n.midi, vel: Math.round(n.velocity * 127), ch: parseInt(ch), on: true });
      allNotes.push({ time: n.time + n.duration, pitch: n.midi, vel: 0, ch: parseInt(ch), on: false });
    });
  });
  allNotes.sort((a, b) => a.time - b.time);
}

// --- TRANSPORT ---
function togglePlay() {
  if (playing) {
    playing = false;
    document.getElementById('playBtn').textContent = '▶ PLAY';
  } else {
    if (!audioCtx) audioCtx = new AudioContext();
    playing = true;
    startAcTime = audioCtx.currentTime;
    document.getElementById('playBtn').textContent = '⏸ PAUSE';
    tick();
  }
}

function tick() {
  if (!playing || !midiOutput) return;
  const t = parseFloat(document.getElementById('tempoSlider').value) / 100;
  const now = (audioCtx.currentTime - startAcTime) * t + startOffset;
  
  while(nextIdx < allNotes.length && allNotes[nextIdx].time <= now) {
    const n = allNotes[nextIdx];
    midiOutput.send([n.on ? (0x90|n.ch) : (0x80|n.ch), n.pitch, n.vel]);
    nextIdx++;
  }
  
  const pct = (now / parsedMidi.duration) * 100;
  document.getElementById('progFill').style.width = Math.min(pct, 100) + '%';
  document.getElementById('timeLabel').textContent = `${fmt(now)} / ${fmt(parsedMidi.duration)}`;

  if (nextIdx < allNotes.length) requestAnimationFrame(tick);
  else stopAll();
}

function stopAll() {
  playing = false; nextIdx = 0; startOffset = 0;
  document.getElementById('playBtn').textContent = '▶ PLAY';
  document.getElementById('progFill').style.width = '0%';
  if (midiOutput) { for(let i=0; i<16; i++) midiOutput.send([0xB0|i, 123, 0]); }
}

function seek(e) {
  if (!parsedMidi) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  startOffset = pct * parsedMidi.duration;
  nextIdx = allNotes.findIndex(n => n.time >= startOffset);
  if (!playing) {
    document.getElementById('progFill').style.width = (pct * 100) + '%';
    document.getElementById('timeLabel').textContent = `${fmt(startOffset)} / ${fmt(parsedMidi.duration)}`;
  } else {
    startAcTime = audioCtx.currentTime;
  }
}

function fmt(s) {
  const m = Math.floor(s/60); const sec = Math.floor(s%60);
  return m + ":" + (sec < 10 ? "0" : "") + sec;
}

function updatePlayBtn() {
  document.getElementById('playBtn').disabled = !(midiOutput && parsedMidi);
}

function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + (type || '');
}

initMidi();
</script>
</body>
</html>
